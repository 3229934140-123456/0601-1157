<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 智能客服助手</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
            <path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <div class="title-group">
          <h1 class="title">AI 智能客服</h1>
          <div class="shop-selector">
            <select id="shopSelect">
              <option value="default">默认店铺</option>
            </select>
          </div>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="btnHistory" title="历史记录">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
        </button>
        <button class="icon-btn" id="btnSettings" title="设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="generate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2v20M2 12h20"/>
        </svg>
        智能生成
      </button>
      <button class="tab-btn" data-tab="scripts">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        话术库
      </button>
      <button class="tab-btn" data-tab="quality">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        质检面板
      </button>
    </nav>

    <main class="content">
      <section class="tab-content active" id="tab-generate">
        <div class="analysis-card">
          <div class="card-header">
            <h3>对话分析</h3>
            <button class="refresh-btn" id="btnRefresh">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
              刷新
            </button>
          </div>
          <div class="analysis-tags" id="analysisTags">
            <span class="tag tag-scenario">识别中...</span>
          </div>
          <div class="analysis-summary" id="analysisSummary">
            点击刷新按钮读取当前对话内容
          </div>
          <div class="order-info" id="orderInfo" style="display:none;">
            <span class="order-label">订单号：</span>
            <span class="order-id" id="orderId">-</span>
          </div>
        </div>

        <div class="tone-selector">
          <span class="selector-label">语气风格：</span>
          <div class="tone-buttons" id="toneButtons">
            <button class="tone-btn active" data-tone="professional">专业</button>
            <button class="tone-btn" data-tone="friendly">亲切</button>
            <button class="tone-btn" data-tone="humorous">幽默</button>
            <button class="tone-btn" data-tone="concise">简洁</button>
            <button class="tone-btn" data-tone="enthusiastic">热情</button>
          </div>
        </div>

        <div class="action-buttons">
          <button class="primary-btn" id="btnGenerate">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
            AI 生成回复
          </button>
          <button class="secondary-btn" id="btnExtractIssues">
            提取客户问题
          </button>
        </div>

        <div class="reply-section">
          <div class="reply-card" id="primaryReply">
            <div class="reply-header">
              <span class="reply-label">推荐回复</span>
              <div class="reply-actions">
                <button class="mini-btn" id="btnRewrite" title="改写过硬措辞">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9"/>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                  </svg>
                  软化
                </button>
                <button class="mini-btn" id="btnFavorite" title="收藏到话术库">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                  </svg>
                  收藏
                </button>
              </div>
            </div>
            <textarea class="reply-content" id="replyContent" placeholder="点击上方按钮生成回复..."></textarea>
            <div class="reply-footer">
              <div class="char-count"><span id="charCount">0</span> 字</div>
              <div class="send-actions">
                <button class="ghost-btn" id="btnCopy">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                  </svg>
                  复制
                </button>
                <button class="primary-btn" id="btnSend">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                  </svg>
                  一键发送
                </button>
              </div>
            </div>
          </div>

          <div class="alternatives-section" id="alternativesSection" style="display:none;">
            <h4>换一种语气</h4>
            <div class="alternatives-list" id="alternativesList"></div>
          </div>

          <div class="extracted-issues" id="extractedIssues" style="display:none;">
            <h4>客户问题提取</h4>
            <div class="issues-list" id="issuesList"></div>
          </div>

          <div class="suggestions-section">
            <h4>快捷插入</h4>
            <div class="suggestions-grid" id="suggestionsGrid">
              <button class="suggestion-card" data-type="promotion">
                <div class="suggestion-icon">🎁</div>
                <div class="suggestion-title">优惠说明</div>
              </button>
              <button class="suggestion-card" data-type="return">
                <div class="suggestion-icon">↩️</div>
                <div class="suggestion-title">退换货指引</div>
              </button>
              <button class="suggestion-card" data-type="params">
                <div class="suggestion-icon">📋</div>
                <div class="suggestion-title">商品参数</div>
              </button>
              <button class="suggestion-card" data-type="shipping">
                <div class="suggestion-icon">🚚</div>
                <div class="suggestion-title">发货说明</div>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="tab-content" id="tab-scripts">
        <div class="scripts-toolbar">
          <input type="text" class="search-input" id="scriptSearch" placeholder="搜索话术...">
          <button class="primary-btn" id="btnAddScript">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新增话术
          </button>
        </div>
        <div class="category-filters" id="categoryFilters">
          <button class="category-btn active" data-category="all">全部</button>
          <button class="category-btn" data-category="接待">接待</button>
          <button class="category-btn" data-category="售后">售后</button>
          <button class="category-btn" data-category="物流">物流</button>
          <button class="category-btn" data-category="商品">商品</button>
          <button class="category-btn favorite-filter" data-category="favorite">⭐ 收藏</button>
        </div>
        <div class="scripts-list" id="scriptsList"></div>
      </section>

      <section class="tab-content" id="tab-quality">
        <div class="quality-stats">
          <div class="stat-card">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">总回复数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statAdopted">0</div>
            <div class="stat-label">已采纳</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statPending">0</div>
            <div class="stat-label">待确认</div>
          </div>
          <div class="stat-card highlight">
            <div class="stat-value" id="statRate">0%</div>
            <div class="stat-label">采纳率</div>
          </div>
        </div>

        <div class="adoption-trends">
          <h3 class="section-title">采纳率趋势</h3>
          <div class="trend-tabs" id="trendTabs">
            <button class="trend-tab active" data-trend="shop">按店铺</button>
            <button class="trend-tab" data-trend="scenario">按场景</button>
            <button class="trend-tab" data-trend="tone">按语气</button>
          </div>
          <div class="trend-chart" id="trendChart"></div>
        </div>

        <div class="quality-actions">
          <button class="secondary-btn" id="btnCompare">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
            </svg>
            对比人工修改
          </button>
          <button class="secondary-btn" id="btnExportQuality">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            导出筛选结果
          </button>
          <button class="ghost-btn" id="btnResetFilter">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M7 12h10M10 18h4"/>
            </svg>
            重置筛选
          </button>
        </div>

        <div class="quality-filters" id="qualityFilters">
          <div class="filter-group">
            <label>时间范围</label>
            <select class="filter-select" id="filterTime">
              <option value="all">全部时间</option>
              <option value="today">今天</option>
              <option value="week">近7天</option>
              <option value="month">近30天</option>
            </select>
          </div>
          <div class="filter-group">
            <label>场景</label>
            <select class="filter-select" id="filterScenario">
              <option value="all">全部场景</option>
              <option value="pre_sales">售前</option>
              <option value="after_sales">售后</option>
            </select>
          </div>
          <div class="filter-group">
            <label>风险等级</label>
            <select class="filter-select" id="filterRisk">
              <option value="all">全部等级</option>
              <option value="high">高风险</option>
              <option value="medium">中风险</option>
              <option value="low">低风险</option>
            </select>
          </div>
          <div class="filter-group">
            <label>分数区间</label>
            <select class="filter-select" id="filterScore">
              <option value="all">全部分数</option>
              <option value="90-100">90-100分</option>
              <option value="80-89">80-89分</option>
              <option value="60-79">60-79分</option>
              <option value="0-59">0-59分</option>
            </select>
          </div>
        </div>

        <div class="filter-info" id="filterInfo" style="display:none;">
          <span class="filter-count">已筛选 <b id="filteredCount">0</b> 条记录</span>
        </div>

        <div class="quality-list" id="qualityList">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <p>暂无质检记录</p>
          </div>
        </div>
      </section>

      <section class="tab-content" id="tab-settings" style="display:none;">
        <div class="settings-section">
          <h3>API 配置</h3>
          <div class="form-group">
            <label>供应商预设</label>
            <div class="preset-buttons" id="apiPresets">
              <button type="button" class="preset-btn" data-preset="openai">
                <span class="preset-icon">🤖</span> OpenAI
              </button>
              <button type="button" class="preset-btn" data-preset="azure">
                <span class="preset-icon">☁️</span> Azure
              </button>
              <button type="button" class="preset-btn" data-preset="qwen">
                <span class="preset-icon">🐎</span> 通义千问
              </button>
              <button type="button" class="preset-btn" data-preset="doubao">
                <span class="preset-icon">🫘</span> 豆包
              </button>
              <button type="button" class="preset-btn" data-preset="deepseek">
                <span class="preset-icon">🔍</span> DeepSeek
              </button>
              <button type="button" class="preset-btn" data-preset="custom">
                <span class="preset-icon">⚙️</span> 自定义
              </button>
            </div>
          </div>
          <div class="form-group">
            <label>API Key</label>
            <div class="input-with-action">
              <input type="password" id="apiKey" placeholder="请输入 API Key">
            </div>
          </div>
          <div class="form-group">
            <label>API 地址</label>
            <input type="text" id="apiEndpoint" placeholder="https://api.openai.com/v1/chat/completions">
          </div>
          <div class="form-group">
            <label>模型</label>
            <select id="modelSelect">
              <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
              <option value="gpt-4">GPT-4</option>
              <option value="gpt-4-turbo">GPT-4 Turbo</option>
              <option value="qwen-plus">通义千问 Plus</option>
              <option value="qwen-max">通义千问 Max</option>
              <option value="doubao-pro-32k">豆包 Pro 32K</option>
              <option value="deepseek-chat">DeepSeek Chat</option>
              <option value="deepseek-reasoner">DeepSeek R1</option>
            </select>
          </div>
          <div class="form-group">
            <button type="button" class="secondary-btn" id="btnTestApi" style="width:100%;justify-content:center;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
              测试连接
            </button>
            <div class="test-result" id="apiTestResult" style="display:none;"></div>
          </div>
          <div class="fallback-option">
            <label class="checkbox-label">
              <input type="checkbox" id="enableFallback" checked>
              <span>API 不可用时自动使用本地模板</span>
            </label>
          </div>
        </div>

        <div class="settings-section">
          <h3>店铺管理</h3>
          <div id="shopsList"></div>
          <button class="secondary-btn" id="btnAddShop">+ 新增店铺</button>
        </div>

        <div class="settings-section">
          <h3>内容安全</h3>
          <div class="form-group toggle-group">
            <label>启用敏感词屏蔽</label>
            <label class="switch">
              <input type="checkbox" id="enableSensitiveFilter" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="form-group toggle-group">
            <label>启用高风险检测</label>
            <label class="switch">
              <input type="checkbox" id="enableRiskDetection" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="form-group">
            <label>敏感词列表（逗号分隔）</label>
            <textarea id="sensitiveWords" rows="2">保证,一定,绝对,100%,永久,终身,最便宜,最低价,第一,唯一</textarea>
          </div>
        </div>

        <div class="settings-section">
          <h3>显示设置</h3>
          <div class="form-group toggle-group">
            <label>显示情绪提示</label>
            <label class="switch">
              <input type="checkbox" id="showEmotion" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="form-group toggle-group">
            <label>显示质检面板</label>
            <label class="switch">
              <input type="checkbox" id="showQuality" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="settings-footer">
          <button class="primary-btn" id="btnSaveSettings">保存设置</button>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal" id="scriptModal">
      <div class="modal-header">
        <h3 id="modalTitle">新增话术</h3>
        <button class="close-btn" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>标题</label>
          <input type="text" id="scriptTitle" placeholder="话术标题">
        </div>
        <div class="form-group">
          <label>分类</label>
          <select id="scriptCategory">
            <option value="接待">接待</option>
            <option value="售后">售后</option>
            <option value="物流">物流</option>
            <option value="商品">商品</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>标签（逗号分隔）</label>
          <input type="text" id="scriptTags" placeholder="例如：欢迎,开场">
        </div>
        <div class="form-group">
          <label>话术内容</label>
          <textarea id="scriptContent" rows="5" placeholder="请输入话术内容..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="ghost-btn" id="cancelScript">取消</button>
        <button class="primary-btn" id="saveScript">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="compareModal" style="display:none;">
    <div class="modal compare-modal">
      <div class="modal-header">
        <h3>对比人工修改</h3>
        <button class="close-btn" id="closeCompareModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="compare-grid">
          <div class="compare-col">
            <h4>AI 生成回复</h4>
            <textarea id="compareOriginal" readonly></textarea>
          </div>
          <div class="compare-col">
            <h4>人工修改后</h4>
            <textarea id="compareModified" placeholder="请输入您修改后的内容..."></textarea>
          </div>
        </div>
        <div class="form-group">
          <label>质检评分 (0-100)</label>
          <input type="number" id="qualityScore" min="0" max="100" value="85">
        </div>
        <div class="form-group">
          <label>备注</label>
          <textarea id="qualityNotes" rows="2" placeholder="修改原因、改进建议等..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="ghost-btn" id="cancelCompare">取消</button>
        <button class="primary-btn" id="saveCompare">保存记录</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="qualityDetailModal" style="display:none;">
    <div class="modal detail-modal">
      <div class="modal-header">
        <h3 id="detailTitle">质检记录详情</h3>
        <button class="close-btn" id="closeDetailModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-section">
          <h4>AI 生成原文</h4>
          <div class="detail-content" id="detailOriginal"></div>
        </div>
        <div class="detail-section">
          <h4>人工修改后</h4>
          <div class="detail-content" id="detailModified"></div>
        </div>
        <div class="detail-section">
          <h4>差异对比 <span class="detail-subtitle">(绿色=新增, 红色=删除)</span></h4>
          <div class="detail-diff" id="detailDiff"></div>
        </div>
        <div class="detail-section" id="detailNotesSection" style="display:none;">
          <h4>备注</h4>
          <div class="detail-content" id="detailNotes"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="ghost-btn" id="copyOriginalBtn">复制原文</button>
        <button class="ghost-btn" id="copyModifiedBtn">复制修改版</button>
        <button class="primary-btn" id="closeDetailBtn">关闭</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="sidebar.js"></script>
</body>
</html>
